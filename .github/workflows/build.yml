#как называется workflow в Actions
name: Build Docker Image and Push it

#когда кто-то делает пуш в ветке main - делай jobs
on:
  push:
    branches:
      - main


jobs:
#запустить убунту; использовать модуль который скачает код на виртуальную машину
#запусть там команду сборки докер образа
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push doker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: tiffea/devops-project1:latest